<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TALK:TALK — AI 영어 스피치 교실</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: #4A90E2;
  --blue-dark: #2B6CB0;
  --green: #48BB78;
  --green-dark: #276749;
  --orange: #ED8936;
  --purple: #9F7AEA;
  --red: #FC8181;
  --yellow: #F6E05E;
  --bg: #EBF8FF;
  --card: #FFFFFF;
  --text: #2D3748;
  --text-soft: #718096;
  --border: #BEE3F8;
  --radius: 16px;
  --shadow: 0 4px 20px rgba(74,144,226,0.13);
}

body {
  font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 40px;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #2B6CB0, #4A90E2, #48BB78);
  color: #fff;
  text-align: center;
  padding: 20px 16px 16px;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.header-title {
  font-size: 26px;
  font-weight: 900;
  letter-spacing: -0.5px;
}
.header-title span { color: #F6E05E; }
.header-sub { font-size: 12px; opacity: 0.85; margin-top: 2px; }

/* ── API KEY BAR ── */
.api-bar {
  background: #FFFDE7;
  border-bottom: 2px solid #F6E05E;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.api-bar label { font-size: 12px; font-weight: 700; color: #744210; white-space: nowrap; }
.api-bar input {
  flex: 1;
  min-width: 200px;
  border: 1.5px solid #F6AD55;
  border-radius: 8px;
  padding: 7px 12px;
  font-size: 13px;
  font-family: monospace;
  outline: none;
  background: #fff;
}
.api-bar input:focus { border-color: #ED8936; }
.api-bar-hint { font-size: 11px; color: #975A16; width: 100%; }

/* ── MAIN ── */
.main { max-width: 640px; margin: 0 auto; padding: 16px; }

/* ── STEP CARD ── */
.step-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 16px;
  overflow: hidden;
}
.step-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  border-bottom: 1px solid #EBF8FF;
  cursor: pointer;
  user-select: none;
}
.step-badge {
  background: linear-gradient(135deg, var(--blue), var(--blue-dark));
  color: #fff;
  font-size: 11px;
  font-weight: 800;
  padding: 3px 10px;
  border-radius: 20px;
  white-space: nowrap;
}
.step-badge.active { background: linear-gradient(135deg, var(--green), var(--green-dark)); }
.step-badge.done { background: #CBD5E0; }
.step-title { font-size: 15px; font-weight: 700; flex: 1; }
.step-icon { font-size: 22px; }
.step-body { padding: 16px 18px; }
.step-body.hidden { display: none; }

/* ── MODE TOGGLE ── */
.mode-toggle {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  background: #F7FAFC;
  border-radius: 14px;
  padding: 6px;
  margin-bottom: 16px;
}
.mode-btn {
  border: none;
  background: transparent;
  border-radius: 10px;
  padding: 12px 8px;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-soft);
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
  line-height: 1.4;
}
.mode-btn .m-emoji { font-size: 18px; display: block; margin-bottom: 2px; }
.mode-btn.active {
  background: #fff;
  color: var(--blue-dark);
  box-shadow: 0 2px 8px rgba(74,144,226,0.25);
}

/* ── TOPIC CHIPS ── */
.topic-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}
.topic-chip {
  padding: 12px 10px;
  border: 2px solid var(--border);
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  background: #F7FAFC;
  transition: all 0.15s;
  color: var(--text);
  text-align: left;
  line-height: 1.4;
}
.topic-chip:hover { border-color: var(--blue); background: #EBF8FF; }
.topic-chip.selected { border-color: var(--blue); background: var(--blue); color: #fff; }
.topic-chip .t-emoji { font-size: 18px; display: block; margin-bottom: 3px; }

/* ── UNIT (TEXTBOOK) GRID ── */
.unit-semester-label {
  font-size: 12px;
  font-weight: 800;
  color: var(--blue-dark);
  margin: 4px 0 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.unit-semester-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}
.unit-chip {
  padding: 10px 10px;
  border: 2px solid var(--border);
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  background: #F7FAFC;
  transition: all 0.15s;
  color: var(--text);
  text-align: left;
  line-height: 1.35;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.unit-chip:hover { border-color: var(--blue); background: #EBF8FF; }
.unit-chip.selected { border-color: var(--blue); background: var(--blue); color: #fff; }
.unit-chip .u-badge {
  font-size: 10px;
  font-weight: 800;
  color: var(--blue-dark);
  background: #fff;
  border-radius: 20px;
  padding: 1px 8px;
  width: fit-content;
}
.unit-chip.selected .u-badge { background: rgba(255,255,255,0.25); color: #fff; }
.unit-chip.review { border-style: dashed; }
.unit-chip .u-emoji { font-size: 16px; }

/* ── EXAMPLE BOX ── */
.example-box {
  background: linear-gradient(135deg, #EBF8FF, #E6FFFA);
  border-radius: 12px;
  padding: 14px 16px;
  display: none;
}
.example-box.show { display: block; }
.example-label { font-size: 11px; font-weight: 700; color: var(--blue-dark); margin-bottom: 6px; text-transform: uppercase; }
.example-prompt { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 8px; line-height: 1.5; }
.example-sentences { font-size: 13px; color: var(--text-soft); line-height: 1.8; }
.example-sentence { background: #fff; border-radius: 8px; padding: 6px 10px; margin: 4px 0; border-left: 3px solid var(--blue); }
.goal-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.goal-chip {
  background: var(--blue);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
}

/* ── RECORDING ── */
.rec-center { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 8px 0; }
.rec-btn {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #FC8181, #E53E3E);
  color: #fff;
  font-size: 32px;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(229,62,62,0.35);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.rec-btn:hover { transform: scale(1.06); }
.rec-btn.on { animation: pulse-rec 1.2s ease-in-out infinite; }
@keyframes pulse-rec {
  0%,100% { box-shadow: 0 6px 24px rgba(229,62,62,0.4), 0 0 0 0 rgba(229,62,62,0.25); }
  50% { box-shadow: 0 6px 24px rgba(229,62,62,0.4), 0 0 0 14px rgba(229,62,62,0); }
}
.rec-timer {
  font-size: 30px;
  font-weight: 900;
  color: #E53E3E;
  font-variant-numeric: tabular-nums;
  letter-spacing: 2px;
  min-height: 36px;
}
.rec-hint { font-size: 13px; color: var(--text-soft); text-align: center; }

.transcript-area {
  background: #F7FAFC;
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  min-height: 70px;
  font-size: 14px;
  color: var(--text);
  line-height: 1.7;
  margin-top: 12px;
}
.t-placeholder { color: #A0AEC0; font-style: italic; }

.audio-section { margin-top: 12px; display: none; }
.audio-section.show { display: block; }
audio { width: 100%; margin-bottom: 10px; accent-color: var(--blue); }
.btn-row { display: flex; gap: 8px; }

/* ── BUTTONS ── */
.btn {
  flex: 1;
  padding: 12px 10px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.15s;
  font-family: inherit;
  text-align: center;
}
.btn-blue { background: var(--blue); color: #fff; }
.btn-blue:hover { background: var(--blue-dark); }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { background: var(--green-dark); }
.btn-outline { background: #fff; border-color: var(--blue); color: var(--blue); }
.btn-outline:hover { background: var(--blue); color: #fff; }
.btn-outline-red { background: #fff; border-color: #FC8181; color: #E53E3E; }
.btn-outline-red:hover { background: #FC8181; color: #fff; }
.btn-full { width: 100%; flex: none; margin-top: 12px; }
.btn-lg { padding: 15px; font-size: 16px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── SELF EVAL ── */
.eval-list { display: flex; flex-direction: column; gap: 14px; }
.eval-item {}
.eval-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.eval-item-label { font-size: 14px; font-weight: 700; }
.eval-item-desc { font-size: 11px; color: var(--text-soft); }
.stars { display: flex; gap: 6px; }
.star {
  font-size: 28px;
  cursor: pointer;
  opacity: 0.25;
  transition: all 0.1s;
  border: none;
  background: none;
  line-height: 1;
  padding: 0;
}
.star.on { opacity: 1; }
.star:hover { transform: scale(1.2); }
.score-label { font-size: 12px; font-weight: 600; color: var(--blue); min-width: 70px; text-align: right; }

/* ── AI FEEDBACK ── */
.ai-loading {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 20px;
  color: var(--text-soft);
  font-size: 14px;
}
.spinner {
  width: 26px; height: 26px;
  border: 3px solid #BEE3F8;
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

.ai-bubble {
  background: linear-gradient(135deg, #EBF8FF 0%, #E6FFFA 100%);
  border-radius: 0 18px 18px 18px;
  padding: 18px 20px;
  position: relative;
  margin-top: 8px;
}
.ai-bubble::before {
  content: '🤖';
  font-size: 24px;
  position: absolute;
  top: -14px;
  left: 10px;
}

.ai-score-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 16px;
  background: #fff;
  border-radius: 12px;
  padding: 12px 16px;
}
.ai-score-big {
  font-size: 42px;
  font-weight: 900;
  color: var(--blue);
  line-height: 1;
}
.ai-score-info { flex: 1; }
.ai-score-label { font-size: 11px; color: var(--text-soft); }
.ai-score-bar-wrap { background: #EBF8FF; border-radius: 20px; height: 8px; margin-top: 6px; overflow: hidden; }
.ai-score-bar { height: 100%; border-radius: 20px; background: linear-gradient(to right, var(--blue), var(--green)); transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }

.ai-section { margin-bottom: 14px; }
.ai-section:last-child { margin-bottom: 0; }
.ai-section-title {
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.ai-section-title.good { color: #276749; }
.ai-section-title.improve { color: #744210; }
.ai-section-title.phrase { color: #553C9A; }
.ai-section-title.cheer { color: #C05621; }
.ai-section-body { font-size: 14px; line-height: 1.75; color: var(--text); }
.ai-phrase-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.ai-phrase {
  background: #fff;
  border: 2px solid #9F7AEA;
  border-radius: 8px;
  padding: 5px 12px;
  font-size: 13px;
  font-weight: 600;
  color: #553C9A;
}
.ai-cheer-box {
  background: linear-gradient(135deg, #FFFDE7, #FEF3C7);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 15px;
  font-weight: 700;
  color: #744210;
  text-align: center;
  margin-top: 12px;
}

/* ── BACK BTN ── */
.back-btn {
  background: none;
  border: none;
  color: var(--blue);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  padding: 8px 0;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 4px;
}
.back-btn:hover { text-decoration: underline; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #2D3748;
  color: #fff;
  padding: 11px 22px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 600;
  z-index: 999;
  transition: transform 0.3s;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── COUNTER ── */
.attempt-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-soft);
  margin-top: 8px;
}
.attempt-dots { display: flex; gap: 4px; }
.dot { width: 9px; height: 9px; border-radius: 50%; background: #CBD5E0; }
.dot.done { background: var(--green); }

@media(max-width:480px) {
  .topic-grid { grid-template-columns: 1fr; }
  .unit-grid { grid-template-columns: 1fr; }
  .btn-row { flex-direction: column; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-title">TALK<span>:</span>TALK</div>
  <div class="header-sub">✨ 초등 5학년 영어 말하기 — AI 스피치 코치</div>
</div>

<!-- API KEY (hidden) -->
<div style="display:none">
  <label>🔑 Claude API Key</label>
  <input type="password" id="apiKey" placeholder="sk-ant-api03-... (교사가 입력)">
  <div class="api-bar-hint">학생은 비워도 괜찮아요 — 선생님이 미리 설정해 두면 돼요!</div>
</div>

<div class="main">

  <!-- STEP 1: 주제 선택 -->
  <div class="step-card" id="card1">
    <div class="step-header" onclick="toggleStep(1)">
      <div class="step-icon">🗂️</div>
      <div class="step-title">오늘 말해볼 주제를 골라봐!</div>
      <div class="step-badge active" id="badge1">STEP 1</div>
    </div>
    <div class="step-body" id="body1">

      <div class="mode-toggle">
        <button class="mode-btn active" id="modeBtnFree" onclick="setMode('free')">
          <span class="m-emoji">🗣️</span>자유 주제
        </button>
        <button class="mode-btn" id="modeBtnUnit" onclick="setMode('unit')">
          <span class="m-emoji">📘</span>교과서 단원 복습
        </button>
      </div>

      <div class="topic-grid" id="topicGrid"></div>
      <div class="topic-grid" id="unitGrid" style="display:none"></div>

      <div class="example-box" id="exampleBox">
        <div class="example-label" id="exLabel">🎯 오늘의 말하기 과제</div>
        <div class="example-prompt" id="exPrompt"></div>
        <div id="exSentences"></div>
        <div class="goal-chips" id="goalChips"></div>
      </div>
      <button class="btn btn-blue btn-full btn-lg" id="btn1" onclick="goStep2()" disabled>
        다음 단계로 ▶
      </button>
    </div>
  </div>

  <!-- STEP 2: 말하기 -->
  <div class="step-card" id="card2">
    <div class="step-header" onclick="toggleStep(2)">
      <div class="step-icon">🎤</div>
      <div class="step-title">이제 영어로 말해봐!</div>
      <div class="step-badge" id="badge2">STEP 2</div>
    </div>
    <div class="step-body hidden" id="body2">
      <div class="rec-center">
        <div class="rec-timer" id="recTimer">00:00</div>
        <button class="rec-btn" id="recBtn" onclick="toggleRec()">🎤</button>
        <div class="rec-hint" id="recHint">버튼을 누르고 영어로 말해봐! 🗣️</div>
      </div>
      <div class="attempt-row">
        <span>도전 횟수</span>
        <div class="attempt-dots">
          <div class="dot" id="d1"></div>
          <div class="dot" id="d2"></div>
          <div class="dot" id="d3"></div>
        </div>
      </div>
      <div class="transcript-area" id="transcriptArea">
        <span class="t-placeholder">여기에 네가 말한 내용이 나타날 거야 ✨</span>
      </div>
      <div class="audio-section" id="audioSection">
        <audio id="audioPlayer" controls></audio>
        <div class="btn-row">
          <button class="btn btn-outline-red" onclick="retryRec()">🔄 다시 말하기</button>
          <button class="btn btn-green" onclick="goStep3()">✅ 자기평가하기 →</button>
        </div>
      </div>
      <button class="back-btn" onclick="goStep1()">← 주제 바꾸기</button>
    </div>
  </div>

  <!-- STEP 3: 자기평가 -->
  <div class="step-card" id="card3">
    <div class="step-header" onclick="toggleStep(3)">
      <div class="step-icon">✅</div>
      <div class="step-title">스스로 평가해봐!</div>
      <div class="step-badge" id="badge3">STEP 3</div>
    </div>
    <div class="step-body hidden" id="body3">
      <div class="eval-list" id="evalList"></div>
      <div style="margin-top:16px">
        <label style="font-size:13px;font-weight:700;color:var(--text-soft);display:block;margin-bottom:6px">💬 오늘 말하기 소감 (선택)</label>
        <textarea id="evalComment" style="width:100%;border:2px solid var(--border);border-radius:10px;padding:10px 12px;font-size:13px;resize:vertical;min-height:60px;font-family:inherit;outline:none;color:var(--text)" placeholder="오늘 어떠했어? 자유롭게 적어봐!"></textarea>
      </div>
      <button class="btn btn-blue btn-full btn-lg" onclick="getFeedback()" id="btnFeedback">
        🤖 AI 피드백 받기
      </button>
      <button class="back-btn" onclick="goStep2()">← 다시 녹음하기</button>
    </div>
  </div>

  <!-- STEP 4: AI 피드백 -->
  <div class="step-card" id="card4">
    <div class="step-header" onclick="toggleStep(4)">
      <div class="step-icon">🧠</div>
      <div class="step-title">AI 피드백이 왔어!</div>
      <div class="step-badge" id="badge4">STEP 4</div>
    </div>
    <div class="step-body hidden" id="body4">
      <div id="feedbackContent">
        <div style="text-align:center;padding:28px;color:var(--text-soft);font-size:14px">
          STEP 3에서 자기평가 후 AI 피드백을 받아봐! 🌟
        </div>
      </div>
      <div id="afterFeedback" style="display:none">
        <button class="btn btn-blue btn-full" style="margin-top:14px" onclick="resetAll()">
          🔄 새 주제로 다시 도전하기!
        </button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────
// DATA
// ─────────────────────────────────────────
const FREE_TOPICS = [
  {
    emoji: '👋',
    label: '자기소개\nMy name is...',
    prompt: '자신에 대해 소개해봐! 이름, 나이, 좋아하는 것을 영어로 말해봐.',
    sentences: [
      'Hi! My name is ___.',
      'I am ___ years old.',
      'I like ___ very much.',
      'My favorite ___ is ___.'
    ],
    goals: ['3문장 이상', '이름 + 나이', '좋아하는 것'],
    keywords: ['My name is', 'I am', 'I like', 'My favorite']
  },
  {
    emoji: '🍕',
    label: '음식 / 좋아하는 것\nI like / I love...',
    prompt: '좋아하는 음식이나 것들을 영어로 말해봐!',
    sentences: [
      'My favorite food is ___.',
      'I love eating ___ because ___.',
      'I don\'t like ___ very much.',
      'I always eat ___ for breakfast / lunch / dinner.'

function openStep(n) {

    const body = document.getElementById('body'+i);
    if (body) body.classList.toggle('hidden', i !== n);
  }
  S.currentStep = n;

function toggleStep(n) {
  const body = document.getElementById('body'+n);
  if (body) body.classList.toggle('hidden');
}

  document.getElementById('body1').classList.remove('hidden');

  openStep(3);

// TOPIC
// ─────────────────────────────────────────
function selectTopic(idx) {
  S.topicIdx = idx;
  const selector = S.mode === 'unit' ? '.unit-chip' : '.topic-chip';
  document.querySelectorAll(selector).forEach((c,i) =>
    c.classList.toggle('selected', i===idx));

  const t = currentList()[idx];
  document.getElementById('exPrompt').textContent = t.prompt;
  document.getElementById('exSentences').innerHTML = t.sentences
    .map(s => `<div class="example-sentence">💬 ${s}</div>`).join('');
  document.getElementById('goalChips').innerHTML = t.goals
    .map(g => `<span class="goal-chip">✓ ${g}</span>`).join('');
  document.getElementById('exampleBox').classList.add('show');
  document.getElementById('btn1').disabled = false;
}

// ─────────────────────────────────────────
// RECORDING
// ─────────────────────────────────────────
async function toggleRec() {
  if (S.isRecording) stopRec();
  else await startRec();
}

async function startRec() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    S.isRecording = true;
    S.timerSec = 0;

    // MediaRecorder
    const chunks = [];
    S.mediaRecorder = new MediaRecorder(stream);
    S.mediaRecorder.ondataavailable = e => chunks.push(e.data);
    S.mediaRecorder.onstop = () => {
      S.audioBlob = new Blob(chunks, { type: 'audio/webm' });
      const url = URL.createObjectURL(S.audioBlob);
      document.getElementById('audioPlayer').src = url;
      document.getElementById('audioSection').classList.add('show');
      S.attemptCount = Math.min(S.attemptCount + 1, 3);
      updateDots();
    };
    S.mediaRecorder.start();

    // Timer
    S.timerInterval = setInterval(() => {
      S.timerSec++;
      const m = String(Math.floor(S.timerSec/60)).padStart(2,'0');
      const s = String(S.timerSec%60).padStart(2,'0');
      document.getElementById('recTimer').textContent = m+':'+s;
    }, 1000);

    // UI
    const btn = document.getElementById('recBtn');
    btn.textContent = '⏹';
    btn.classList.add('on');
    document.getElementById('recHint').textContent = '말하는 중... 끝나면 다시 눌러봐! ⏹';
    document.getElementById('transcriptArea').innerHTML = '<span class="t-placeholder">인식 중... 🎤</span>';
    document.getElementById('audioSection').classList.remove('show');

    // Speech Recognition
    startSR();
  } catch(e) {
    toast('마이크 권한이 필요해요! 🎤 설정에서 허용해줘.');
  }
}

function stopRec() {
  if (S.recognition) { try { S.recognition.stop(); } catch(e){} }
  if (S.mediaRecorder?.state !== 'inactive') {
    S.mediaRecorder.stop();
    S.mediaRecorder.stream.getTracks().forEach(t => t.stop());
  }
  clearInterval(S.timerInterval);
  S.isRecording = false;

  const btn = document.getElementById('recBtn');
  btn.textContent = '🎤';
  btn.classList.remove('on');
  document.getElementById('recHint').textContent = '잘했어! 녹음을 들어보고 다음 단계로 가봐! 🎉';
}

function startSR() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  S.recognition = new SR();
  S.recognition.lang = 'en-US';
  S.recognition.continuous = true;
  S.recognition.interimResults = true;
  S.transcript = '';

  S.recognition.onresult = e => {
    let final = '', interim = '';
    for (let i=0; i<e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
      else interim += e.results[i][0].transcript;
    }
    S.transcript = final.trim();
    document.getElementById('transcriptArea').innerHTML =
      (final ? `<span>${final}</span>` : '') +
      (interim ? `<span style="color:#A0AEC0">${interim}</span>` : '');
  };
  S.recognition.onerror = () => {};
  S.recognition.start();
}

function retryRec() {
  S.audioBlob = null;
  S.transcript = '';
  clearInterval(S.timerInterval);
  S.timerSec = 0;
  S.isRecording = false;
  document.getElementById('recTimer').textContent = '00:00';
  document.getElementById('recBtn').textContent = '🎤';
  document.getElementById('recBtn').classList.remove('on');
  document.getElementById('recHint').textContent = '버튼을 누르고 영어로 말해봐! 🗣️';
  document.getElementById('transcriptArea').innerHTML = '<span class="t-placeholder">여기에 네가 말한 내용이 나타날 거야 ✨</span>';
  document.getElementById('audioSection').classList.remove('show');
}

function updateDots() {
  for(let i=1;i<=3;i++) {
    document.getElementById('d'+i).classList.toggle('done', i <= S.attemptCount);
  }
}

function setScore(id, val) {
  S.scores[id] = val;
  for(let v=1;v<=5;v++) {
    const star = document.getElementById(`star-${id}-${v}`);
    if (star) star.classList.toggle('on', v <= val);
  }
  document.getElementById(`slabel-${id}`).textContent = SCORE_LABELS[val];
}

function renderEvalItems() {
  const list = document.getElementById('evalList');
  EVAL_ITEMS.forEach(item => { S.scores[item.id] = 0; });
  list.innerHTML = EVAL_ITEMS.map(item => `
    <div class="eval-item">
      <div class="eval-item-header">
        <div>
          <div class="eval-item-label">${item.label}</div>
          <div class="eval-item-desc">${item.desc}</div>
        </div>
        <div class="score-label" id="slabel-${item.id}">—</div>
      </div>
      <div class="stars" id="stars-${item.id}">
        ${[1,2,3,4,5].map(v =>
          `<button class="star" id="star-${item.id}-${v}" onclick="setScore('${item.id}',${v})">⭐</button>`
        ).join('')}
      </div>
    </div>
  `).join('');
}

async function getFeedback() {
  const allDone = EVAL_ITEMS.every(item => S.scores[item.id] > 0);
  if (!allDone) { toast('모든 항목을 별로 평가해봐! ⭐'); return; }

  openStep(4);
  document.getElementById('body4').classList.remove('hidden');

  const content = document.getElementById('feedbackContent');
  content.innerHTML = `<div class="ai-loading"><div class="spinner"></div>AI가 열심히 분석 중이야... 잠깐만 기다려봐! 🤖</div>`;
  document.getElementById('afterFeedback').style.display = 'none';

  const topic = currentList()[S.topicIdx];
  const comment = document.getElementById('evalComment').value.trim();
  const avgScore = (Object.values(S.scores).reduce((a,b)=>a+b,0) / EVAL_ITEMS.length).toFixed(1);
  const scoreDetail = EVAL_ITEMS.map(item => `${item.label}: ${S.scores[item.id]}/5`).join(', ');

  const systemPrompt = `You are an enthusiastic, warm, and encouraging English speech coach for Korean 5th graders (age 11). 
Your feedback is specific, actionable, and age-appropriate. You always celebrate effort first, then guide improvement.
Respond ONLY in this exact format with these section headers:

SCORE: [integer 0-100]
GOOD: [2-3 specific things the student did well — be concrete, mention actual phrases or efforts]
IMPROVE: [1-2 specific improvements with HOW to improve — give exact example sentences]
PHRASES: [exactly 3 useful English expressions for this topic, format: "English phrase" — Korean meaning]
NEXT: [one specific challenge for their next attempt — make it exciting!]
CHEER: [one enthusiastic encouraging sentence in Korean — make it warm and personal]`;

  const userPrompt = `Student's speaking practice:
Topic: ${topic.emoji} ${topic.label.replace('\n',' — ')}
Task prompt: ${topic.prompt}
What student said: "${S.transcript || '(음성 텍스트 인식 없음 — 발화 시도는 했으나 텍스트 미확인)'}"
Practice attempts: ${S.attemptCount} time(s)
Self-evaluation: ${scoreDetail} (average: ${avgScore}/5)
Student's comment: "${comment || 'none'}"
Duration: ${S.timerSec} seconds`;

  const apiKey = document.getElementById('apiKey').value.trim();

  try {
    let feedbackText = '';

    if (apiKey) {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: systemPrompt,
          messages: [{ role: 'user', content: userPrompt }]
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(()=>({}));
        throw new Error(err.error?.message || `API 오류 (${res.status})`);
      }
      const data = await res.json();
      feedbackText = data.content?.[0]?.text || '';
    } else {
      // Demo mode
      await new Promise(r => setTimeout(r, 1600));
      feedbackText = `SCORE: 72
GOOD: 영어로 말하려는 용기가 정말 대단해요! 특히 "${topic.keywords?.[0] || 'I'}" 표현을 사용해서 말하려고 노력한 점이 훌륭해요. ${S.timerSec > 10 ? `${S.timerSec}초 동안 말을 이어간 것도 훌륭해요!` : '짧지만 집중해서 말한 점도 좋아요!'}
IMPROVE: 문장을 조금 더 길게 말해봐요. 예를 들어 "I like pizza." 대신 "I like pizza because it's very delicious." 처럼 이유를 붙여봐요! 또한 말하기 전에 주제 키워드를 먼저 생각해두면 더 자신 있게 말할 수 있어요.
PHRASES: "I really like ___." — 저는 정말 ___를 좋아해요 / "My favorite ___ is ___." — 제가 가장 좋아하는 ___는 ___예요 / "Because it's ___." — 왜냐하면 ___이기 때문이에요
NEXT: 다음엔 이유를 꼭 "because"로 설명해봐요! "I want to be a doctor because I want to help people." 처럼요.
CHEER: 오늘 정말 잘했어요! 영어로 말하는 게 어렵지만 포기하지 않는 네가 정말 자랑스러워요! 💪🌟`;
    }

    renderFeedback(feedbackText, avgScore);
  } catch(e) {
    content.innerHTML = `
      <div style="text-align:center;padding:24px;color:#E53E3E">
        <div style="font-size:36px;margin-bottom:10px">😢</div>
        <div style="font-weight:700;margin-bottom:8px">피드백을 가져오지 못했어요</div>
        <div style="font-size:12px;color:var(--text-soft);margin-bottom:16px">${e.message}</div>
        <button class="btn btn-blue" style="width:auto;padding:10px 20px" onclick="getFeedback()">다시 시도</button>
      </div>`;
  }
}

function renderFeedback(text, avgScore) {
  const parse = key => {
    const m = text.match(new RegExp(`${key}:\\s*([\\s\\S]*?)(?=\\n[A-Z]+:|$)`));
    return m ? m[1].trim() : '';
  };

  const score = parseInt(parse('SCORE')) || Math.round(parseFloat(avgScore)*20);
  const good    = parse('GOOD');
  const improve = parse('IMPROVE');
  const phrases = parse('PHRASES');
  const next    = parse('NEXT');
  const cheer   = parse('CHEER');

  const phraseItems = phrases.split('/').filter(p=>p.trim()).map(p => {
    const parts = p.trim().split('—');
    return `<span class="ai-phrase">${parts[0].replace(/"/g,'').trim()} ${parts[1] ? '— '+parts[1].trim() : ''}</span>`;
  }).join('');

  const barW = Math.min(score, 100);
  const scoreColor = score >= 80 ? '#276749' : score >= 60 ? '#2B6CB0' : '#744210';

  document.getElementById('feedbackContent').innerHTML = `
    <div class="ai-bubble">
      <div class="ai-score-row">
        <div class="ai-score-big" style="color:${scoreColor}">${score}</div>
        <div class="ai-score-info">
          <div class="ai-score-label">오늘의 스피치 점수</div>
          <div class="ai-score-bar-wrap">
            <div class="ai-score-bar" style="width:0%" id="scoreBar"></div>
          </div>
          <div style="font-size:11px;color:var(--text-soft);margin-top:4px">
            ${score >= 80 ? '🌟 훌륭해요!' : score >= 60 ? '👍 잘 하고 있어요!' : '💪 조금 더 도전해봐!'}
          </div>
        </div>
      </div>

      ${good ? `<div class="ai-section">
        <div class="ai-section-title good">✅ 잘한 점</div>
        <div class="ai-section-body">${good}</div>
      </div>` : ''}

      ${improve ? `<div class="ai-section">
        <div class="ai-section-title improve">💡 이렇게 하면 더 좋아요</div>
        <div class="ai-section-body">${improve}</div>
      </div>` : ''}

      ${phraseItems ? `<div class="ai-section">
        <div class="ai-section-title phrase">📝 이 표현을 써봐!</div>
        <div class="ai-phrase-row">${phraseItems}</div>
      </div>` : ''}

      ${next ? `<div class="ai-section">
        <div class="ai-section-title" style="color:#2B6CB0">🚀 다음 도전</div>
        <div class="ai-section-body">${next}</div>
      </div>` : ''}

      ${cheer ? `<div class="ai-cheer-box">🌟 ${cheer}</div>` : ''}
    </div>
  `;

  // Animate bar
  setTimeout(() => {
    const bar = document.getElementById('scoreBar');
    if (bar) bar.style.width = barW + '%';
  }, 100);

  document.getElementById('afterFeedback').style.display = 'block';
}

// ─────────────────────────────────────────
// RESET
// ─────────────────────────────────────────
function resetAll() {
  S.topicIdx = -1;
  S.audioBlob = null;
  S.transcript = '';
  S.attemptCount = 0;
  S.timerSec = 0;
  clearInterval(S.timerInterval);
  S.isRecording = false;

  renderTopics();
  renderUnits();
  renderEvalItems();
  document.getElementById('evalComment').value = '';
  document.getElementById('recTimer').textContent = '00:00';
  document.getElementById('recBtn').textContent = '🎤';
  document.getElementById('recBtn').classList.remove('on');
  document.getElementById('recHint').textContent = '버튼을 누르고 영어로 말해봐! 🗣️';
  document.getElementById('transcriptArea').innerHTML = '<span class="t-placeholder">여기에 네가 말한 내용이 나타날 거야 ✨</span>';
  document.getElementById('audioSection').classList.remove('show');
  document.getElementById('exampleBox').classList.remove('show');
  document.getElementById('btn1').disabled = true;
  updateDots();
  document.getElementById('feedbackContent').innerHTML = `
    <div style="text-align:center;padding:28px;color:var(--text-soft);font-size:14px">
      STEP 3에서 자기평가 후 AI 피드백을 받아봐! 🌟
    </div>`;
  document.getElementById('afterFeedback').style.display = 'none';
  openStep(1);
  document.getElementById('body1').classList.remove('hidden');
}

// ─────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
